server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Emit relative redirects (Location: /ti-84/ not http://localhost/ti-84/).
    # The container listens on :80 internally but is published on another port
    # (e.g. :8084); an absolute redirect would bake in the wrong port and send the
    # browser to a dead URL when adding the trailing slash for directory routes.
    absolute_redirect off;

    # Clean URLs for the Astro static build WITHOUT a trailing-slash redirect:
    # serve the directory's index.html directly (`$uri/index.html`) rather than
    # `$uri/`, which would issue a 301 to add the slash. Avoiding the 301 matters
    # because it would be a permanent redirect (cached by browsers) and, behind a
    # published port, nginx bakes the wrong port into it. So "/ti-84" serves
    # /ti-84/index.html with a 200.
    location / {
        try_files $uri $uri/index.html $uri.html =404;
    }
}
