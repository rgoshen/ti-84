server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Clean URLs for the Astro static build: try the exact file, then the
    # directory (its index.html), then the ".html" fallback. So "/ti-84" serves
    # /ti-84/index.html and "/graphing" serves /graphing/index.html.
    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
