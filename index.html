<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TI-84 Calculator</title>
  <meta name="description" content="Online TI-84 graphing calculator." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
    };
  </script>
  <script>
    (function () {
      const stored = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = stored || (prefersDark ? 'dark' : 'light');
      if (theme === 'light') document.documentElement.classList.remove('dark');
      else document.documentElement.classList.add('dark');
    })();
  </script>
</head>
<body class="bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 min-h-screen flex flex-col transition-colors duration-300">
  <header class="border-b border-slate-200 dark:border-slate-800 sticky top-0 bg-white dark:bg-slate-900 z-10">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-6">
        <h1 class="text-2xl font-semibold tracking-tight">TI-84 Calculator</h1>
        <nav aria-label="Main" class="flex items-center gap-1">
          <a href="index.html" aria-current="page"
            class="px-3 py-1.5 rounded-md text-sm font-medium bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-slate-100">
            TI-84
          </a>
          <a href="graphing.html"
            class="px-3 py-1.5 rounded-md text-sm font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
            Graphing Calculator Online
          </a>
        </nav>
      </div>
      <button id="theme-toggle" type="button" aria-label="Toggle theme"
        class="inline-flex items-center gap-2 rounded-md border border-slate-300 dark:border-slate-700 px-3 py-1.5 text-sm font-medium hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 hidden dark:block" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5" />
          <path stroke-linecap="round" d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4" />
        </svg>
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 block dark:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.8A9 9 0 1111.2 3 7 7 0 0021 12.8z" />
        </svg>
        <span id="theme-label">Light</span>
      </button>
    </div>
  </header>

  <main class="flex-1 flex items-start justify-center px-4 py-8">
    <div class="w-full max-w-3xl">
      <div class="rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden bg-white dark:bg-slate-800">
        <iframe src="https://ti84calc.com/ti84calc" width="600px" height="800px" frameborder="0" allow="fullscreen"
          class="w-full block" style="min-height: 800px;"></iframe>
      </div>
      <p class="mt-4 text-sm text-slate-500 dark:text-slate-400 text-center">
        Embedded calculator provided by
        <a href="https://ti84calc.com" class="underline hover:text-slate-700 dark:hover:text-slate-200">ti84calc.com</a>.
      </p>
    </div>
  </main>

  <footer class="border-t border-slate-200 dark:border-slate-800">
    <div class="max-w-5xl mx-auto px-6 py-4 text-sm text-slate-500 dark:text-slate-400 text-center">
      &copy; <span id="year"></span> TI-84 Calculator. All rights reserved by their respective owners.
    </div>
  </footer>

  <script>
    const toggle = document.getElementById('theme-toggle');
    const label = document.getElementById('theme-label');

    function syncLabel() {
      label.textContent = document.documentElement.classList.contains('dark') ? 'Dark' : 'Light';
    }
    syncLabel();

    toggle.addEventListener('click', () => {
      const isDark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      syncLabel();
    });

    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
