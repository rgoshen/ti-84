services:
  graphing-calculator:
    build: .
    image: ti-84:latest
    container_name: graphing-calculator
    ports:
      - "${HOST_PORT:-8080}:80"
    environment:
      HOST_PORT: ${HOST_PORT:-8080}
      SITE_TITLE_TI84: ${SITE_TITLE_TI84:-TI-84 Calculator}
      SITE_TITLE_GRAPHING: ${SITE_TITLE_GRAPHING:-Graphing Calculator Online}
      THEME_DEFAULT: ${THEME_DEFAULT:-dark}
      TI84_IFRAME_SRC: ${TI84_IFRAME_SRC:-https://ti84calc.com/ti84calc}
    restart: unless-stopped